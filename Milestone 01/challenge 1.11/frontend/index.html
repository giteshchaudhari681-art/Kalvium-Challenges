<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Chatbot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="chat-card">
        <div class="hero">
          <p class="eyebrow">Challenge 1.11</p>
          <h1>AI Chatbot</h1>
          <p class="subcopy">
            A frontend chat UI backed by an Express server that forwards the
            full conversation to OpenRouter.
          </p>
        </div>

        <div id="chat-history" class="chat-history" aria-live="polite"></div>

        <form id="chat-form" class="composer">
          <textarea
            id="message-input"
            name="message"
            rows="3"
            placeholder="Ask anything..."
            required
          ></textarea>
          <div class="composer-actions">
            <p class="hint">Press Enter to send. Shift+Enter adds a new line.</p>
            <button id="send-button" type="submit">Send</button>
          </div>
        </form>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
